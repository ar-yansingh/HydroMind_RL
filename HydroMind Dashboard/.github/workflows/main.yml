name: Deploy HydroMind GNN to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY_NAME: hydromindacr
  IMAGE_NAME: hydromind-inference
  RESOURCE_GROUP: Sayantanu-Ghosh-RG
  WEB_APP_NAME: hydromind-inference-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR with Docker
      run: |
        echo "${{ secrets.AZURE_PASSWORD }}" | docker login -u "${{ secrets.AZURE_USERNAME }}" --password-stdin "${{ secrets.AZURE_LOGIN_SERVER }}"

    - name: Build Docker image
      run: |
        docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     -t ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
                     .
      working-directory: ${{ github.workspace }}

    - name: Push image to ACR
      run: |
        docker push ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

    - name: Configure Web App
      run: |
        az webapp config appsettings set \
          --name ${{ env.WEB_APP_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --settings WEBSITES_PORT=8000 WEBSITES_CONTAINER_START_TIME_LIMIT=1800
          
        az webapp config container set \
          --name ${{ env.WEB_APP_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --docker-custom-image-name "${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest" \
          --docker-registry-server-url "https://${{ secrets.AZURE_LOGIN_SERVER }}" \
          --docker-registry-server-user "${{ secrets.AZURE_USERNAME }}" \
          --docker-registry-server-password "${{ secrets.AZURE_PASSWORD }}"

    - name: Restart Web App
      run: |
        az webapp restart \
          --name ${{ env.WEB_APP_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }}

    - name: Verify deployment
      run: |
        WEB_APP_URL=$(az webapp show --name ${{ env.WEB_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "defaultHostName" -o tsv)
        echo "Web App URL: https://$WEB_APP_URL"
        echo "Waiting for app to initialize (up to 10 mins)..."
        for i in {1..40}; do
          if curl -f "https://$WEB_APP_URL/health"; then
            echo "Deployment Verified!"
            exit 0
          fi
          echo "Still initializing ($i/40)..."
          sleep 15
        done
        echo "Verification timed out, but check the URL manually."
        exit 1

    - name: Azure logout
      run: az logout
      if: always()
